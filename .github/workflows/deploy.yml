name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (import workbooks + astro build + encrypt protected courses)
        run: npm run build
        env:
          # Strict: fail the build if a protected course has no password, so we
          # never deploy a course that should be locked but isn't.
          STATICRYPT_STRICT: '1'
          # Per-course passwords. Add each as a repo secret:
          # Settings → Secrets and variables → Actions → New repository secret.
          # One secret per protected course, named COURSE_PW_<SLUG>.
          COURSE_PW_CHECKERS: ${{ secrets.COURSE_PW_CHECKERS }}
          COURSE_PW_TANK_SURVIVAL: ${{ secrets.COURSE_PW_TANK_SURVIVAL }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
